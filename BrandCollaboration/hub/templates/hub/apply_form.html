{% extends 'hub/base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <div class="card-header bg-primary text-white p-4">
                    <h3 class="mb-0 fw-bold">Submit <span class="text-white-50">Proposal</span></h3>
                    <p class="mb-0 small opacity-75">Review the campaign details for <strong>{{ campaign.title }}</strong></p>
                </div>
                
                <div class="card-body p-5">
                    <div class=" p-4 rounded-4 mb-4 border-start border-primary border-5">
                        <div class="d-flex justify-content-between mb-2">
                            <span class="text-muted small">Offered Budget</span>
                            <span class="fw-bold text-success">₹{{ campaign.budget }}</span>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted small">Brand</span>
                            <span class="fw-bold text-dark">{{ campaign.brand.username }}</span>
                        </div>
                        <h6 class="fw-bold">Description</h6>
                        <p class="text-muted small mb-0">{{ campaign.description }}</p>
                    </div>

                    <form method="post" action="{% url 'apply_to_campaign' campaign.id %}">
                        {% csrf_token %}
                        <div class="mb-4">
                            <label class="form-label fw-bold">Pitch yourself (Optional)</label>
                            <textarea name="message" class="form-control rounded-3" rows="4" 
                                placeholder="Why are you the perfect fit for this Lucknow-based campaign?"></textarea>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg rounded-pill shadow-sm fw-bold">
                                <i class="bi bi-send-fill me-2"></i> Send Application
                            </button>
                            <a href="{% url 'campaign_feed' %}" class="btn btn-link text-muted">Go Back to Feed</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
